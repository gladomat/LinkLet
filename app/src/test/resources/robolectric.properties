# Use a plain Application for Robolectric unit tests instead of the production
# @HiltAndroidApp LinkLetApp. LinkLetApp's onCreate eagerly builds the Hilt graph,
# which constructs WebDavSettingsRepository -> EncryptedSharedPreferences -> AndroidKeyStore.
# AndroidKeyStore is unavailable under Robolectric (it is a real-device-only security
# provider), so instantiating the production Application throws KeyStoreException and fails
# every Robolectric test. These unit tests build their subjects (ViewModels, composables)
# directly with mocks and do not need Hilt, so a vanilla Application is correct here.
application=android.app.Application
sdk=34
